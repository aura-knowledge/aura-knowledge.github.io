<svg xmlns="http://www.w3.org/2000/svg" width="600" height="240" viewBox="0 0 600 240">
  <defs>
    <style>
      .box { rx: 8; ry: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Input -->
  <rect x="20" y="90" width="140" height="60" fill="#e1f5fe" stroke="#0288d1" stroke-width="2" class="box"/>
  <text x="90" y="118" text-anchor="middle" class="text">One input</text>
  <text x="90" y="138" text-anchor="middle" class="text">Meeting notes</text>

  <!-- Arrow to helper -->
  <line x1="160" y1="120" x2="230" y2="120" class="arrow"/>

  <!-- Helper -->
  <polygon points="270,90 330,120 270,150 210,120" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="270" y="125" text-anchor="middle" class="text">AI helper</text>

  <!-- Arrows to outputs -->
  <line x1="310" y1="105" x2="390" y2="55" class="arrow"/>
  <line x1="330" y1="120" x2="390" y2="120" class="arrow"/>
  <line x1="310" y1="135" x2="390" y2="185" class="arrow"/>

  <!-- Outputs -->
  <rect x="400" y="20" width="180" height="50" fill="#e8f5e9" stroke="#43a047" stroke-width="2" class="box"/>
  <text x="490" y="40" text-anchor="middle" class="text">Output 1</text>
  <text x="490" y="58" text-anchor="middle" class="text">Summary</text>

  <rect x="400" y="95" width="180" height="50" fill="#e8f5e9" stroke="#43a047" stroke-width="2" class="box"/>
  <text x="490" y="115" text-anchor="middle" class="text">Output 2</text>
  <text x="490" y="133" text-anchor="middle" class="text">Follow-up email</text>

  <rect x="400" y="170" width="180" height="50" fill="#e8f5e9" stroke="#43a047" stroke-width="2" class="box"/>
  <text x="490" y="190" text-anchor="middle" class="text">Output 3</text>
  <text x="490" y="208" text-anchor="middle" class="text">Action items</text>
</svg>